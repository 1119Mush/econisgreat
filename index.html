<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE ECON Quantum Market Simulator (Interactive Linkage)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.41.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --inner-box-bg: #f1f5f9;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            
            --color-demand: #0d9488;
            --color-supply: #db2777;
            --color-policy: #7c3aed;
            --color-alert: #ef4444;
            --color-success: #10b981;

            --area-ctb: rgba(249, 115, 22, 0.16);
            --area-ptb: rgba(124, 58, 237, 0.14);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 1285px;
            margin: 0 auto;
        }

        .control-panel, .chart-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04);
        }

        .control-panel {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-sizing: border-box;
            max-height: 90vh;
            overflow-y: auto;
        }

        .chart-panel {
            flex: 1;
            min-width: 450px;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chart-container-wrapper {
            flex: 1;
            position: relative;
            height: 540px;
            background: #ffffff;
        }

        h3 {
            margin: 0 0 5px 0;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .section {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            background: #ffffff;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-main);
            box-sizing: border-box;
            font-size: 12px;
        }

        /* Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #e2e8f0;
            height: 4px;
            border-radius: 2px;
            outline: none;
            margin-top: 5px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #475569;
            cursor: pointer;
        }
        #ed::-webkit-slider-thumb { background: var(--color-demand); }
        #es::-webkit-slider-thumb { background: var(--color-supply); }

        .value-display {
            float: right;
            font-weight: 700;
            font-family: monospace;
            font-size: 12px;
        }

        .btn {
            background: var(--text-main);
            color: #ffffff;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn:hover { opacity: 0.9; }

        .results {
            background: var(--inner-box-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            font-size: 12px;
        }
        .results p {
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
        }
        .results span {
            color: var(--text-main);
            font-weight: 600;
            font-family: monospace;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 5px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .radio-label input { cursor: pointer; accent-color: var(--text-main); }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            cursor: pointer;
        }
        .checkbox-container input { accent-color: var(--text-main); cursor: pointer; }

        hr { border: 0; border-top: 1px solid var(--border-color); margin: 8px 0; }
        
        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--color-success); }
        .badge-alert { background: rgba(239, 110, 110, 0.15); color: var(--color-alert); }
        .badge-neutral { background: rgba(100, 116, 139, 0.12); color: var(--text-muted); }

        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <h1>📊 DSE ECON QUANTUM MODEL SIMULATOR</h1>
    
    <div class="container">
        <div class="control-panel">
            
            <div class="section">
                <h3>📐 Initial Market Anchor / 初始市場均衡點</h3>
                <div class="grid-2" style="margin-top: 5px;">
                    <div>
                        <label>Base Price (P*)</label>
                        <input type="number" id="baseP" value="50" min="1">
                    </div>
                    <div>
                        <label>Base Quantity (Q*)</label>
                        <input type="number" id="baseQ" value="50" min="1">
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>📈 Elasticity Sliders / 供求彈性</h3>
                <div style="margin-bottom: 12px;">
                    <label>Demand Elasticity (Ed) <span class="value-display" id="ed-val" style="color: var(--color-demand);">1.0</span></label>
                    <input type="range" id="ed" min="0" max="4.0" step="0.1" value="1.0">
                </div>
                <div>
                    <label>Supply Elasticity (Es) <span class="value-display" id="es-val" style="color: var(--color-supply);">1.0</span></label>
                    <input type="range" id="es" min="0" max="4.0" step="0.1" value="1.0">
                </div>
            </div>

            <div class="section">
                <h3>🏛️ Target Market State / 目標市場狀態</h3>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="marketMode" id="modeAuto" value="auto" checked>
                        Auto Equilibrium (自動均衡)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="marketMode" id="modeManual" value="manual">
                        Manual Linkage (手動互鎖模式)
                    </label>
                </div>
                
                <div id="manualInputContainer" style="display: none; margin-top: 10px;" class="grid-2">
                    <div>
                        <label>Market Price (P) ✍️</label>
                        <input type="number" id="manualP" value="50">
                    </div>
                    <div>
                        <label>Market Quantity (Q) ✍️</label>
                        <input type="number" id="manualQ" value="50">
                    </div>
                </div>
            </div>

            <div id="policySection" class="section">
                <h3>⚠️ Policy Intervention / 政府干預</h3>
                <label>Policy Type / 政策類型</label>
                <select id="policyType">
                    <option value="none">None / 無政策</option>
                    <option value="ceil">Price Ceiling / 價格上限</option>
                    <option value="floor">Price Floor / 價格下限</option>
                    <option value="tax">Per-unit Tax / 從量稅</option>
                    <option value="sub">Per-unit Subs
