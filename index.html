<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>DSE ECON Market Simulator V5.2 | 平板左右佈局</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.41.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg-color: #f8fafc;
      --panel-bg: #ffffff;
      --inner-box-bg: #f1f5f9;
      --border-color: #e2e8f0;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --color-demand: #0d9488;
      --color-supply: #db2777;
      --color-policy: #7c3aed;
      --color-alert: #ef4444;
      --color-success: #10b981;
      --panel-radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      font-weight: 700;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      letter-spacing: 0.5px;
      margin: 10px 0 25px;
      color: var(--text-main);
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
    }

    /* 控制面板 */
    .control-panel {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--panel-radius);
      padding: 20px;
      box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04);
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      max-height: 85vh;
      transition: all 0.2s;
    }

    /* 图表面板 */
    .chart-panel {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--panel-radius);
      padding: 20px;
      box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04);
      flex: 1;
      min-width: 300px;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .chart-container-wrapper {
      flex: 1;
      position: relative;
      height: 50vh;
      min-height: 350px;
      max-height: 600px;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
    }

    h3 {
      margin: 0 0 5px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    h3::after {
      content: "▼";
      font-size: 10px;
      margin-left: 8px;
      transition: transform 0.2s;
    }

    .section.collapsed h3::after {
      transform: rotate(-90deg);
    }

    .section-content {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.2s;
    }

    .section.collapsed .section-content {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      margin-bottom: 0;
    }

    .section {
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      background: #ffffff;
    }

    .section:not(.collapsed) .section-content {
      margin-top: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-main);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input[type="number"],
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-color);
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      opacity: 0.6;
      height: 28px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: #e2e8f0;
      height: 6px;
      border-radius: 3px;
      outline: none;
      margin: 8px 0;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #475569;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    #ed::-webkit-slider-thumb { background: var(--color-demand); }
    #es::-webkit-slider-thumb { background: var(--color-supply); }

    .value-display {
      float: right;
      font-weight: 700;
      font-family: monospace;
      font-size: 13px;
    }

    .btn {
      background: var(--text-main);
      color: #ffffff;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      touch-action: manipulation;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }

    .results {
      background: var(--inner-box-bg);
      border: 1px solid var(--border-color);
      padding: 14px;
      border-radius: 12px;
      font-size: 13px;
    }
    .results p {
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
    }
    .results span {
      color: var(--text-main);
      font-weight: 600;
      font-family: monospace;
    }

    .radio-group {
      display: flex;
      gap: 15px;
      margin: 8px 0;
      flex-wrap: wrap;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .radio-label input { accent-color: var(--text-main); transform: scale(1.1); }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
    }
    .checkbox-container input { accent-color: var(--text-main); transform: scale(1.1); }

    hr { border: 0; border-top: 1px solid var(--border-color); margin: 10px 0; }

    .badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--color-success); }
    .badge-neutral { background: rgba(100, 116, 139, 0.12); color: var(--text-muted); }

    .legend-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 5px;
    }

    /* ---------- 响应式：仅手机端（≤640px）切换为上下布局 ---------- */
    @media (max-width: 640px) {
      body { padding: 10px; }
      .container {
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }
      .control-panel, .chart-panel {
        max-width: 100%;
        width: 100%;
        margin: 0;
        border-radius: 12px;
      }
      .control-panel {
        max-height: none;
        overflow-y: visible;
      }
      .chart-container-wrapper {
        height: 40vh;
        min-height: 300px;
      }
      h1 { font-size: 1.4rem; margin-bottom: 15px; }
      .grid-2 {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .radio-group {
        gap: 10px;
      }
      .btn {
        padding: 12px 16px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <h1>📊 DSE ECON QUANTUM MARKET SIMULATOR</h1>

  <div class="container">
    <!-- 控制面板区 -->
    <div class="control-panel">
      <div class="section">
        <h3 onclick="toggleSection(this)">📐 Initial Market Anchor / 初始均衡點</h3>
        <div class="section-content">
          <div class="grid-2">
            <div><label>Base Price (P*)</label><input type="number" id="baseP" value="50" min="1"></div>
            <div><label>Base Quantity (Q*)</label><input type="number" id="baseQ" value="50" min="1"></div>
          </div>
        </div>
      </div>

      <div class="section">
        <h3 onclick="toggleSection(this)">📈 Elasticity / 彈性</h3>
        <div class="section-content">
          <div style="margin-bottom: 12px;">
            <label>Demand Elasticity (Ed) <span class="value-display" id="ed-val">1.0</span></label>
            <input type="range" id="ed" min="0" max="4.0" step="0.1" value="1.0">
          </div>
          <div>
            <label>Supply Elasticity (Es) <span class="value-display" id="es-val">1.0</span></label>
            <input type="range" id="es" min="0" max="4.0" step="0.1" value="1.0">
          </div>
        </div>
      </div>

      <div class="section">
        <h3 onclick="toggleSection(this)">🏛️ Market State / 市場狀態</h3>
        <div class="section-content">
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="marketMode" id="modeAuto" value="auto" checked> Auto Equilibrium</label>
            <label class="radio-label"><input type="radio" name="marketMode" id="modeManual" value="manual"> Manual Linkage</label>
          </div>
          <div id="manualInputContainer" style="display:none; margin-top:10px;" class="grid-2">
            <div><label>Price (P) ✍️</label><input type="number" id="manualP" value="50" min="0"></div>
            <div style="opacity:0.7;"><label>Resulting Q</label><input type="number" id="manualQ" readonly></div>
          </div>
        </div>
      </div>

      <div class="section">
        <h3 onclick="toggleSection(this)">⚠️ Policy / 政策干預</h3>
        <div class="section-content">
          <label>Policy Type</label>
          <select id="policyType">
            <option value="none">None / 無政策</option>
            <option value="ceil">Price Ceiling / 價格上限</option>
            <option value="floor">Price Floor / 價格下限</option>
            <option value="tax">Per-unit Tax / 從量稅</option>
            <option value="sub">Per-unit Subsidy / 從量補貼</option>
          </select>
          <div id="policyInputContainer" style="margin-top:10px; display:none;">
            <label id="policyInputLabel">Value</label>
            <input type="number" id="policyDirectValue" value="0" min="0">
          </div>
          <label class="checkbox-container">
            <input type="checkbox" id="showTRArea" checked> Show TR Boundary
          </label>
        </div>
      </div>

      <div class="results">
        <h3>📊 Diagnostic Matrix</h3>
        <p>Price (P): <span id="res-p">-</span></p>
        <p>Quantity (Q_e): <span id="res-q">-</span></p>
        <p>Total Revenue: <span id="res-tr">-</span></p>
        <hr>
        <p>Mode: <span id="res-mode">-</span></p>
        <p>Condition: <span id="res-condition">-</span></p>
        <div id="burdenMetrics" style="display:none;">
          <hr>
          <p><span class="legend-dot" style="background:#f97316;"></span><span id="label-c-share">Consumer:</span> <span id="res-ctb">-</span></p>
          <p><span class="legend-dot" style="background:#7c3aed;"></span><span id="label-p-share">Producer:</span> <span id="res-ptb">-</span></p>
          <p id="govTotalLabel">Volume: <span id="res-gov-total">-</span></p>
        </div>
      </div>
    </div>

    <!-- 图表面板区 -->
    <div class="chart-panel">
      <div class="chart-container-wrapper" id="downloadArea">
        <canvas id="marketChart"></canvas>
      </div>
      <button class="btn" id="downloadBtn">📸 Download Diagram</button>
    </div>
  </div>

  <script>
    (function() {
      // 手风琴折叠功能
      window.toggleSection = function(header) {
        const section = header.parentElement;
        section.classList.toggle('collapsed');
      };

      // 仅手机宽度（≤640px）自动折叠部分区块
      function autoCollapseForMobile() {
        if (window.innerWidth <= 640) {
          document.querySelectorAll('.section').forEach(s => {
            if (!s.classList.contains('results')) s.classList.add('collapsed');
          });
        } else {
          document.querySelectorAll('.section').forEach(s => s.classList.remove('collapsed'));
        }
      }
      window.addEventListener('resize', autoCollapseForMobile);
      autoCollapseForMobile();

      // 核心业务逻辑
      const basePInput = document.getElementById('baseP');
      const baseQInput = document.getElementById('baseQ');
      const edSlider = document.getElementById('ed');
      const esSlider = document.getElementById('es');
      const modeAuto = document.getElementById('modeAuto');
      const modeManual = document.getElementById('modeManual');
      const manualInputContainer = document.getElementById('manualInputContainer');
      const manualPInput = document.getElementById('manualP');
      const manualQInput = document.getElementById('manualQ');
      const policyType = document.getElementById('policyType');
      const policyInputContainer = document.getElementById('policyInputContainer');
      const policyInputLabel = document.getElementById('policyInputLabel');
      const policyDirectValue = document.getElementById('policyDirectValue');
      const showTRAreaCheck = document.getElementById('showTRArea');

      let marketState = {};

      const econVisualPlugin = {
        id: 'econVisualPlugin',
        beforeDatasetsDraw(chart) {
          const { ctx, scales: { x, y } } = chart;
          ctx.save();
          const xZero = x.getPixelForValue(0);
          const yZero = y.getPixelForValue(0);
          const safeX = (val) => Math.max(xZero, Math.min(x.getPixelForValue(val), x.getPixelForValue(x.max)));
          const safeY = (val) => Math.max(y.getPixelForValue(y.max), Math.min(y.getPixelForValue(val), yZero));

          const xQ = safeX(marketState.Q_disp);
          const yP = safeY(marketState.P_disp);
          const yP_base = safeY(marketState.P_base);
          const yP_buyer = safeY(marketState.P_buyer);
          const yP_seller = safeY(marketState.P_seller);

          if (marketState.showTR && marketState.Q_disp > 0) {
            ctx.fillStyle = 'rgba(15, 23, 42, 0.025)';
            ctx.fillRect(xZero, yP, xQ - xZero, yZero - yP);
            ctx.strokeStyle = 'rgba(100, 116, 139, 0.25)';
            ctx.lineWidth = 1.2;
            ctx.setLineDash([4, 4]);
            ctx.strokeRect(xZero, yP, xQ - xZero, yZero - yP);
          }

          if (marketState.Q_disp > 0) {
            if (marketState.policy === 'tax') {
              ctx.fillStyle = 'rgba(249, 115, 22, 0.16)';
              ctx.fillRect(xZero, Math.min(yP_buyer, yP_base), xQ - xZero, Math.abs(yP_buyer - yP_base));
              ctx.fillStyle = 'rgba(124, 58, 237, 0.14)';
              ctx.fillRect(xZero, Math.min(yP_base, yP_seller), xQ - xZero, Math.abs(yP_base - yP_seller));
            } else if (marketState.policy === 'sub') {
              ctx.fillStyle = 'rgba(249, 115, 22, 0.16)';
              ctx.fillRect(xZero, Math.min(yP_base, yP_buyer), xQ - xZero, Math.abs(yP_base - yP_buyer));
              ctx.fillStyle = 'rgba(124, 58, 237, 0.14)';
              ctx.fillRect(xZero, Math.min(yP_seller, yP_base), xQ - xZero, Math.abs(yP_seller - yP_base));
            }
          }

          ctx.strokeStyle = 'rgba(71, 85, 105, 0.5)';
          ctx.lineWidth = 1.2;
          ctx.setLineDash([4, 4]);
          ctx.beginPath(); ctx.moveTo(xQ, yP); ctx.lineTo(xZero, yP); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(xQ, yP); ctx.lineTo(xQ, yZero); ctx.stroke();
          if (marketState.policy === 'tax' || marketState.policy === 'sub') {
            ctx.beginPath(); ctx.moveTo(xQ, yP_seller); ctx.lineTo(xZero, yP_seller); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(xQ, yP_buyer); ctx.lineTo(xZero, yP_buyer); ctx.stroke();
          }

          ctx.font = '600 11px -apple-system, sans-serif';
          ctx.fillStyle = '#1e293b';
          ctx.setLineDash([]);
          ctx.fillText('Q_e', xQ + 6, yZero - 10);
          if (marketState.policy === 'tax' || marketState.policy === 'sub') {
            ctx.fillText('P_B', xZero + 8, yP_buyer - 6);
            ctx.fillText('P_S', xZero + 8, yP_seller - 6);
          } else {
            ctx.fillText('P', xZero + 8, yP - 6);
          }
          ctx.fillStyle = '#10b981';
          ctx.beginPath();
          ctx.arc(xQ, yP, 4, 0, 2 * Math.PI);
          ctx.fill();
          ctx.restore();
        }
      };

      const ctx = document.getElementById('marketChart').getContext('2d');
      let marketChart = new Chart(ctx, {
        type: 'line',
        plugins: [econVisualPlugin],
        data: {
          datasets: [
            { label: 'Demand (D)', data: [], borderColor: '#0d9488', borderWidth: 2.5, fill: false, pointRadius: 0 },
            { label: 'Supply (S)', data: [], borderColor: '#db2777', borderWidth: 2.5, fill: false, pointRadius: 0 },
            { label: 'Policy Line', data: [], borderColor: '#7c3aed', borderWidth: 1.5, borderDash: [5, 4], fill: false, pointRadius: 0 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 30 },
          scales: {
            x: {
              type: 'linear', min: 0, title: { display: true, text: 'Quantity (Q)' }, grid: { color: '#f1f5f9' },
              ticks: { callback: (v) => Math.round(v) }
            },
            y: {
              type: 'linear', min: 0, title: { display: true, text: 'Price (P)' }, grid: { color: '#f1f5f9' },
              ticks: { callback: (v) => Math.round(v) }
            }
          }
        }
      });

      function updateMarket() {
        let P_base = Math.max(0.01, parseFloat(basePInput.value) || 50);
        let Q_base = Math.max(0.01, parseFloat(baseQInput.value) || 50);
        let edVal = parseFloat(edSlider.value);
        let esVal = parseFloat(esSlider.value);
        let showTR = showTRAreaCheck.checked;

        document.getElementById('ed-val').innerText = edVal === 0 ? "0 (Inelastic)" : edVal === 4.0 ? "Inf (Elastic)" : edVal.toFixed(1);
        document.getElementById('es-val').innerText = esVal === 0 ? "0 (Inelastic)" : esVal === 4.0 ? "Inf (Elastic)" : esVal.toFixed(1);

        let policy = policyType.value;
        let pVal = Math.max(0, parseFloat(policyDirectValue.value) || 0);
        let P_disp = P_base, Q_disp = Q_base, P_buyer = P_base, P_seller = P_base;
        let modeText = '<span class="badge badge-success">Auto Eq</span>';
        let conditionText = "Equilibrium";

        let slopeD = (edVal >= 3.95) ? 0 : (edVal <= 0.05 ? 999999 : (P_base / (Q_base * edVal)));
        let slopeS = (esVal >= 3.95) ? 0 : (esVal <= 0.05 ? 999999 : (P_base / (Q_base * esVal)));
        let d_intercept_P = P_base + (edVal <= 0.05 ? 0 : slopeD * Q_base);
        let s_intercept_P = P_base - (esVal <= 0.05 ? 0 : slopeS * Q_base);
        let consumerShare = 0, producerShare = 0, totalPolicyVol = 0;

        const getQd = (P) => {
          if (edVal >= 3.95) return Number.MAX_VALUE;
          if (edVal <= 0.05) return Q_base;
          return Math.max(0, (d_intercept_P - P) / slopeD);
        };
        const getQs = (P) => {
          if (esVal >= 3.95) return Number.MAX_VALUE;
          if (esVal <= 0.05) return Q_base;
          return Math.max(0, (P - s_intercept_P) / slopeS);
        };

        if (modeManual.checked) {
          modeText = '<span class="badge badge-neutral">Manual</span>';
          let inputP = parseFloat(manualPInput.value) || P_base;
          P_disp = Math.max(0, inputP);
          let Qd_at_P = getQd(P_disp);
          let Qs_at_P = getQs(P_disp);
          Q_disp = Math.min(Qd_at_P, Qs_at_P);
          manualQInput.value = Q_disp.toFixed(1);
          if (Math.abs(Qd_at_P - Qs_at_P) < 0.1) conditionText = "Equilibrium";
          else if (Qs_at_P > Qd_at_P) conditionText = "Surplus (Q_s > Q_d)";
          else conditionText = "Shortage (Q_d > Q_s)";
        } else {
          if (policy === 'none') { P_disp = P_base; Q_disp = Q_base; }
          else if (policy === 'ceil') {
            if (pVal < P_base) { P_disp = pVal; Q_disp = Math.min(getQd(pVal), getQs(pVal)); conditionText = "Shortage (Ceiling)"; }
            else { P_disp = P_base; Q_disp = Q_base; }
          } else if (policy === 'floor') {
            if (pVal > P_base) { P_disp = pVal; Q_disp = Math.min(getQd(pVal), getQs(pVal)); conditionText = "Surplus (Floor)"; }
            else { P_disp = P_base; Q_disp = Q_base; }
          } else if (policy === 'tax') {
            if (edVal >= 3.95 && esVal >= 3.95) { P_buyer = P_base; P_seller = P_base - pVal; Q_disp = 0; }
            else if (edVal >= 3.95) { P_buyer = P_base; P_seller = Math.max(0, P_base - pVal); Q_disp = (esVal >= 3.95) ? 0 : Math.max(0, Q_base - (pVal / slopeS)); }
            else if (edVal <= 0.05) { P_buyer = P_base + pVal; P_seller = P_base; Q_disp = Q_base; }
            else if (esVal <= 0.05) { P_buyer = d_intercept_P - slopeD * Q_base; P_seller = Math.max(0, P_buyer - pVal); Q_disp = Q_base; }
            else if (esVal >= 3.95) { P_buyer = P_base + pVal; P_seller = P_base; Q_disp = Math.max(0, (d_intercept_P - P_buyer) / slopeD); }
            else {
              P_buyer = (d_intercept_P * slopeS + (s_intercept_P + pVal) * slopeD) / (slopeS + slopeD);
              P_seller = Math.max(0, P_buyer - pVal);
              Q_disp = Math.max(0, (d_intercept_P - P_buyer) / slopeD);
            }
            P_disp = P_buyer;
            consumerShare = Math.max(0, P_buyer - P_base) * Q_disp;
            producerShare = Math.max(0, P_base - P_seller) * Q_disp;
            totalPolicyVol = pVal * Q_disp;
          } else if (policy === 'sub') {
            if (edVal >= 3.95 && esVal >= 3.95) { P_buyer = P_base; P_seller = P_base + pVal; Q_disp = 0; }
            else if (edVal >= 3.95) { P_buyer = P_base; P_seller = P_base + pVal; Q_disp = (esVal >= 3.95) ? 0 : Q_base + (pVal / slopeS); }
            else if (edVal <= 0.05) { P_buyer = Math.max(0, P_base - pVal); P_seller = P_base; Q_disp = Q_base; }
            else if (esVal <= 0.05) { P_buyer = d_intercept_P - slopeD * Q_base; P_seller = P_buyer + pVal; Q_disp = Q_base; }
            else if (esVal >= 3.95) { P_buyer = Math.max(0, P_base - pVal); P_seller = P_base; Q_disp = Math.max(0, (d_intercept_P - P_buyer) / slopeD); }
            else {
              P_buyer = Math.max(0, (d_intercept_P * slopeS + (s_intercept_P - pVal) * slopeD) / (slopeS + slopeD));
              P_seller = P_buyer + pVal;
              Q_disp = Math.max(0, (d_intercept_P - P_buyer) / slopeD);
            }
            P_disp = P_buyer;
            consumerShare = Math.max(0, P_base - P_buyer) * Q_disp;
            producerShare = Math.max(0, P_seller - P_base) * Q_disp;
            totalPolicyVol = pVal * Q_disp;
          }
        }

        if (P_seller < 0) P_seller = 0;
        marketState = { P_disp, Q_disp, P_base, Q_base, P_buyer, P_seller, policy, showTR };

        document.getElementById('res-p').innerText = '$' + P_disp.toFixed(1);
        document.getElementById('res-q').innerText = Q_disp.toFixed(1);
        document.getElementById('res-tr').innerText = '$' + (P_disp * Q_disp).toFixed(0);
        document.getElementById('res-mode').innerHTML = modeText;
        document.getElementById('res-condition').innerText = conditionText;

        let burdenMetrics = document.getElementById('burdenMetrics');
        if (modeAuto.checked && (policy === 'tax' || policy === 'sub')) {
          burdenMetrics.style.display = 'block';
          if (policy === 'tax') {
            document.getElementById('label-c-share').innerText = "Consumer Burden:";
            document.getElementById('label-p-share').innerText = "Producer Burden:";
            document.getElementById('govTotalLabel').innerHTML = `Tax Revenue: <span>$${totalPolicyVol.toFixed(0)}</span>`;
          } else {
            document.getElementById('label-c-share').innerText = "Consumer Benefit:";
            document.getElementById('label-p-share').innerText = "Producer Benefit:";
            document.getElementById('govTotalLabel').innerHTML = `Budget Exp: <span>$${totalPolicyVol.toFixed(0)}</span>`;
          }
          document.getElementById('res-ctb').innerText = '$' + consumerShare.toFixed(0);
          document.getElementById('res-ptb').innerText = '$' + producerShare.toFixed(0);
        } else {
          burdenMetrics.style.display = 'none';
        }

        let axisMax = Math.ceil(Math.max(P_base*2.2, Q_base*2.2, P_disp*1.4, Q_disp*1.4, P_buyer*1.3, P_seller*1.3, 100) / 20) * 20;
        marketChart.options.scales.x.max = axisMax;
        marketChart.options.scales.y.max = axisMax;

        let dPoints = [], sPoints = [];
        if (edVal <= 0.05) dPoints = [{x:Q_base, y:0}, {x:Q_base, y:axisMax}];
        else if (edVal >= 3.95) dPoints = [{x:0, y:P_base}, {x:axisMax, y:P_base}];
        else dPoints = [{x:0, y:d_intercept_P}, {x:Math.max(0, d_intercept_P/slopeD), y:0}];

        if (esVal <= 0.05) sPoints = [{x:Q_base, y:0}, {x:Q_base, y:axisMax}];
        else if (esVal >= 3.95) sPoints = [{x:0, y:P_base}, {x:axisMax, y:P_base}];
        else {
          let startX = s_intercept_P < 0 ? (-s_intercept_P/slopeS) : 0;
          let startY = s_intercept_P < 0 ? 0 : s_intercept_P;
          sPoints = [{x:startX, y:startY}, {x:axisMax, y:s_intercept_P + slopeS*axisMax}];
        }

        let pPoints = [];
        if (modeAuto.checked) {
          if (policy === 'ceil' || policy === 'floor') pPoints = [{x:0, y:pVal}, {x:axisMax, y:pVal}];
          else if (policy === 'tax') {
            if (esVal <= 0.05) pPoints = [{x:Q_base,y:0},{x:Q_base,y:axisMax}];
            else if (esVal >= 3.95) pPoints = [{x:0,y:P_base+pVal},{x:axisMax,y:P_base+pVal}];
            else {
              let si = s_intercept_P + pVal;
              let sx = si < 0 ? (-si/slopeS) : 0;
              let sy = si < 0 ? 0 : si;
              pPoints = [{x:sx, y:sy}, {x:axisMax, y:si + slopeS*axisMax}];
            }
          } else if (policy === 'sub') {
            if (esVal <= 0.05) pPoints = [{x:Q_base,y:0},{x:Q_base,y:axisMax}];
            else if (esVal >= 3.95) pPoints = [{x:0,y:Math.max(0,P_base-pVal)},{x:axisMax,y:Math.max(0,P_base-pVal)}];
            else {
              let si = s_intercept_P - pVal;
              let sx = si < 0 ? (-si/slopeS) : 0;
              let sy = si < 0 ? 0 : si;
              pPoints = [{x:sx, y:sy}, {x:axisMax, y:si + slopeS*axisMax}];
            }
          }
        }

        marketChart.data.datasets[0].data = dPoints;
        marketChart.data.datasets[1].data = sPoints;
        marketChart.data.datasets[2].data = pPoints;
        marketChart.update();
      }

      function handleModeToggle() {
        if (modeManual.checked) {
          manualInputContainer.style.display = 'grid';
          policyType.value = 'none';
          policyInputContainer.style.display = 'none';
        } else {
          manualInputContainer.style.display = 'none';
        }
        updateMarket();
      }

      modeAuto.addEventListener('change', handleModeToggle);
      modeManual.addEventListener('change', handleModeToggle);
      showTRAreaCheck.addEventListener('change', updateMarket);
      manualPInput.addEventListener('input', updateMarket);
      [basePInput, baseQInput, policyDirectValue].forEach(el => el.addEventListener('input', updateMarket));

      policyType.addEventListener('change', function() {
        if (this.value === 'none') { policyInputContainer.style.display = 'none'; }
        else {
          modeAuto.checked = true;
          manualInputContainer.style.display = 'none';
          policyInputContainer.style.display = 'block';
          let currentP = parseFloat(basePInput.value) || 50;
          if (this.value === 'ceil') { policyInputLabel.innerText = "Ceiling Price ($):"; policyDirectValue.value = Math.max(1, currentP-15); }
          if (this.value === 'floor') { policyInputLabel.innerText = "Floor Price ($):"; policyDirectValue.value = currentP+15; }
          if (this.value === 'tax') { policyInputLabel.innerText = "Tax per unit ($):"; policyDirectValue.value = 15; }
          if (this.value === 'sub') { policyInputLabel.innerText = "Subsidy per unit ($):"; policyDirectValue.value = 15; }
        }
        updateMarket();
      });

      [edSlider, esSlider].forEach(el => el.addEventListener('input', updateMarket));

      document.getElementById('downloadBtn').addEventListener('click', () => {
        html2canvas(document.getElementById('downloadArea'), { scale: 3 }).then(canvas => {
          let link = document.createElement('a');
          link.download = 'dse-market-v5.2.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        });
      });

      updateMarket();
    })();
  </script>
</body>
</html>
