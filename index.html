<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE ECON Market Simulator (Focused Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.41.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --inner-box-bg: #f1f5f9;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            
            --color-demand: #0d9488;       /* Sage Teal */
            --color-supply: #db2777;       /* Dusty Fig Pink */
            --color-policy: #7c3aed;       /* Lavender Purple */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 1250px;
            margin: 0 auto;
        }

        .control-panel, .chart-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04);
        }

        .control-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }

        .chart-panel {
            flex: 1;
            min-width: 450px;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chart-container-wrapper {
            flex: 1;
            position: relative;
            height: 520px;
            background: #ffffff;
        }

        h3 {
            margin: 0 0 5px 0;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .section {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            background: #ffffff;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Minimalist Inputs */
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-main);
            box-sizing: border-box;
            font-size: 12px;
        }

        /* Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #e2e8f0;
            height: 4px;
            border-radius: 2px;
            outline: none;
            margin-top: 5px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #475569;
            cursor: pointer;
        }
        #ed::-webkit-slider-thumb { background: var(--color-demand); }
        #es::-webkit-slider-thumb { background: var(--color-supply); }

        .value-display {
            float: right;
            font-weight: 700;
            font-family: monospace;
            font-size: 12px;
        }

        .btn {
            background: var(--text-main);
            color: #ffffff;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn:hover { opacity: 0.9; }

        .results {
            background: var(--inner-box-bg);
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 12px;
            font-size: 12px;
        }
        .results p {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
        }
        .results span {
            color: var(--text-main);
            font-weight: 600;
            font-family: monospace;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .radio-label input { cursor: pointer; accent-color: var(--text-main); }

        hr { border: 0; border-top: 1px solid var(--border-color); margin: 10px 0; }
    </style>
</head>
<body>

    <h1>📊 INTERACTIVE ECONOMICS SIMULATOR</h1>
    
    <div class="container">
        <div class="control-panel">
            
            <div class="section">
                <h3>📈 Market Curves / 供求彈性</h3>
                <div style="margin-bottom: 15px; margin-top: 10px;">
                    <label>Elasticity of Demand (Ed) <span class="value-display" id="ed-val" style="color: var(--color-demand);">1.0</span></label>
                    <input type="range" id="ed" min="0.2" max="2.5" step="0.1" value="1.0">
                </div>
                <div>
                    <label>Elasticity of Supply (Es) <span class="value-display" id="es-val" style="color: var(--color-supply);">1.0</span></label>
                    <input type="range" id="es" min="0.2" max="2.5" step="0.1" value="1.0">
                </div>
            </div>

            <div class="section">
                <h3>🏛️ Target Market State / 目標市場狀態</h3>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="marketMode" id="modeAuto" value="auto" checked>
                        Auto Equilibrium (自動均衡)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="marketMode" id="modeManual" value="manual">
                        Manual Input (手動指定)
                    </label>
                </div>
                
                <div id="manualInputContainer" style="display: none; margin-top: 10px;" class="grid-2">
                    <div>
                        <label>Set Price (P)</label>
                        <input type="number" id="manualP" value="50" min="5" max="95">
                    </div>
                    <div>
                        <label>Set Quantity (Q)</label>
                        <input type="number" id="manualQ" value="50" min="5" max="95">
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>⚠️ Intervention Policies / 政府干預</h3>
                <label>Policy Type / 政策類型</label>
                <select id="policyType">
                    <option value="none">None / 無政策</option>
                    <option value="ceil">Price Ceiling / 價格上限</option>
                    <option value="floor">Price Floor / 價格下限</option>
                    <option value="tax">Per-unit Tax / 從量稅</option>
                    <option value="sub">Per-unit Subsidy / 從量補貼</option>
                </select>
                
                <div id="policySliderContainer" style="margin-top: 12px; display: none;">
                    <label id="policyLabel">Value: <span id="policyVal">0</span></label>
                    <input type="range" id="policyValue" min="0" max="30" step="1" value="0">
                </div>
            </div>

            <div class="results">
                <h3>📊 Data Matrix / 數據矩陣</h3>
                <p>Simulated Price (P): <span id="res-p">-</span></p>
                <p>Simulated Quantity (Q): <span id="res-q">-</span></p>
                <hr>
                <p>Original Eq Price (P*): <span id="res-peq">-</span></p>
                <p>Original Eq Qty (Q*): <span id="res-qeq">-</span></p>
            </div>
        </div>

        <div class="chart-panel">
            <div class="chart-container-wrapper" id="downloadArea">
                <canvas id="marketChart"></canvas>
            </div>
            <button class="btn" id="downloadBtn">📸 Download High-Res Diagram / 一鍵下載高清圖表</button>
        </div>
    </div>

    <script>
        // --- 1. DOM Elements & State ---
        const edSlider = document.getElementById('ed');
        const esSlider = document.getElementById('es');
        const modeAuto = document.getElementById('modeAuto');
        const modeManual = document.getElementById('modeManual');
        const manualInputContainer = document.getElementById('manualInputContainer');
        const manualPInput = document.getElementById('manualP');
        const manualQInput = document.getElementById('manualQ');
        const policyType = document.getElementById('policyType');
        const policyValue = document.getElementById('policyValue');
        const policySliderContainer = document.getElementById('policySliderContainer');
        const policyLabel = document.getElementById('policyLabel');
        const policyVal = document.getElementById('policyVal');

        let marketState = {};

        // --- 2. Economics Core Plugin (Drawing Crosshairs & Annotations) ---
        const econVisualPlugin = {
            id: 'econVisualPlugin',
            beforeDatasetsDraw(chart) {
                const { ctx, scales: { x, y } } = chart;
                ctx.save();

                const xZero = x.getPixelForValue(0);
                const yZero = y.getPixelForValue(0);
                const xQ = x.getPixelForValue(marketState.Q_disp);
                const yP = y.getPixelForValue(marketState.P_disp);

                // Draw Clean Crosshair Drop Lines
                ctx.strokeStyle = 'rgba(71, 85, 105, 0.4)';
                ctx.lineWidth = 1.2;
                ctx.setLineDash([4, 4]);

                ctx.beginPath(); ctx.moveTo(xQ, yP); ctx.lineTo(xZero, yP); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(xQ, yP); ctx.lineTo(xQ, yZero); ctx.stroke();

                // Text Labels on Axis
                ctx.font = '600 11px -apple-system, sans-serif';
                ctx.fillStyle = '#475569';
                ctx.setLineDash([]);
                ctx.fillText('P', xZero + 8, yP - 6);
                ctx.fillText('Q', xQ + 6, yZero - 10);

                ctx.restore();
            }
        };

        // --- 3. Chart Setup ---
        const ctx = document.getElementById('marketChart').getContext('2d');
        let marketChart = new Chart(ctx, {
            type: 'line',
            plugins: [econVisualPlugin],
            data: {
                datasets: [
                    { label: 'Demand (D)', data: [], borderColor: '#0d9488', borderWidth: 2.5, fill: false, pointRadius: 0 },
                    { label: 'Supply (S)', data: [], borderColor: '#db2777', borderWidth: 2.5, fill: false, pointRadius: 0 },
                    { label: 'Policy / Control Guide', data: [], borderColor: '#7c3aed', borderWidth: 1.5, borderDash: [4, 4], fill: false, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false, animation: { duration: 120 },
                scales: {
                    x: { type: 'linear', min: 0, max: 100, title: { display: true, text: 'Quantity (Q)' }, grid: { color: '#f1f5f9' } },
                    y: { type: 'linear', min: 0, max: 100, title: { display: true, text: 'Price (P)' }, grid: { color: '#f1f5f9' } }
                }
            }
        });

        // --- 4. Logic Engine ---
        function updateMarket() {
            let ed = parseFloat(edSlider.value);
            let es = parseFloat(esSlider.value);
            
            document.getElementById('ed-val').innerText = ed.toFixed(1);
            document.getElementById('es-val').innerText = es.toFixed(1);

            // Establish standard underlying mathematical linear curves based on elasticities
            const P_base = 50, Q_base = 50;
            const b = 1 / ed; // Demand slope multiplier
            const d = 1 / es; // Supply slope multiplier
            
            // a and c coefficients for Q = a - bP style frameworks mapped to graph
            const a = Q_base + (P_base * ed); 
            const c = Q_base - (P_base * es);

            // True economic equilibrium
            let P_eq = 50;
            let Q_eq = 50;

            let P_disp = P_eq;
            let Q_disp = Q_eq;

            let policy = policyType.value;
            let pVal = parseFloat(policyValue.value);

            // Check mode
            if (modeAuto.checked) {
                // Auto mode respects policy shifts directly
                if (policy === 'none') {
                    P_disp = P_eq; Q_disp = Q_eq;
                } else if (policy === 'ceil') {
                    P_disp = pVal < P_eq ? pVal : P_eq;
                    Q_disp = pVal < P_eq ? (Q_base + (pVal - P_base) * es) : Q_eq; // limited by supply
                } else if (policy === 'floor') {
                    P_disp = pVal > P_eq ? pVal : P_eq;
                    Q_disp = pVal > P_eq ? (Q_base - (pVal - P_base) * ed) : Q_eq; // limited by demand
                } else if (policy === 'tax') {
                    P_disp = (a - c + d * pVal) / (b + d); // Buyer Price
                    Q_disp = a - b * P_disp;
                } else if (policy === 'sub') {
                    P_disp = (a - c - d * pVal) / (b + d); // Buyer Price
                    Q_disp = a - b * P_disp;
                }
            } else {
                // Manual input override mode
                P_disp = parseFloat(manualPInput.value) || P_base;
                Q_disp = parseFloat(manualQInput.value) || Q_base;
            }

            // Save state globally for visual plugin render reference
            marketState = { P_disp, Q_disp, P_eq, Q_eq };

            // Update DOM output boxes
            document.getElementById('res-p').innerText = '$' + P_disp.toFixed(1);
            document.getElementById('res-q').innerText = Q_disp.toFixed(1);
            document.getElementById('res-peq').innerText = '$' + P_eq.toFixed(1);
            document.getElementById('res-qeq').innerText = Q_eq.toFixed(1);

            // Rebuild coordinate arrays for drawing lines
            let dPoints = [], sPoints = [], pPoints = [];
            for (let p = 0; p <= 100; p += 5) {
                // Demand curve: Q = a - ed * P style mapping
                dPoints.push({ x: Math.max(0, Q_base - (p - P_base) * ed), y: p });
                // Supply curve: Q = Q_base + (P - P_base) * es
                sPoints.push({ x: Math.max(0, Q_base + (p - P_base) * es), y: p });
            }

            // Secondary policy line setups
            if (modeAuto.checked) {
                if (policy === 'ceil' || policy === 'floor') {
                    pPoints = [{ x: 0, y: pVal }, { x: 100, y: pVal }];
                    marketChart.data.datasets[2].label = policy === 'ceil' ? 'Price Ceiling' : 'Price Floor';
                } else if (policy === 'tax') {
                    for(let p=0; p<=100; p+=5) pPoints.push({ x: Math.max(0, Q_base + (p - pVal - P_base) * es), y: p });
                    marketChart.data.datasets[2].label = 'S + Tax';
                } else if (policy === 'sub') {
                    for(let p=0; p<=100; p+=5) pPoints.push({ x: Math.max(0, Q_base + (p + pVal - P_base) * es), y: p });
                    marketChart.data.datasets[2].label = 'S - Subsidy';
                } else {
                    pPoints = [];
                }
            } else {
                // Manual marker lines crosshair explicitly
                pPoints = [{ x: Q_disp, y: 0 }, { x: Q_disp, y: P_disp }, { x: 0, y: P_disp }];
                marketChart.data.datasets[2].label = 'User Custom Target';
            }

            marketChart.data.datasets[0].data = dPoints;
            marketChart.data.datasets[1].data = sData = dPoints; 
            marketChart.data.datasets[1].data = sPoints;
            marketChart.data.datasets[2].data = pPoints;

            marketChart.update();
        }

        // --- 5. Interface Control Routing ---
        function toggleInputMode() {
            if (modeManual.checked) {
                manualInputContainer.style.display = 'grid';
                policyType.value = 'none';
                policySliderContainer.style.display = 'none';
            } else {
                manualInputContainer.style.display = 'none';
            }
            updateMarket();
        }

        modeAuto.addEventListener('change', toggleInputMode);
        modeManual.addEventListener('change', toggleInputMode);
        [manualPInput, manualQInput].forEach(el => el.addEventListener('input', updateMarket));

        policyType.addEventListener('change', function() {
            if (this.value === 'none') { policySliderContainer.style.display = 'none'; } 
            else {
                modeAuto.checked = true; manualInputContainer.style.display = 'none'; // force auto mode
                policySliderContainer.style.display = 'block';
                if(this.value === 'ceil') { policyLabel.childNodes[0].nodeValue = "Ceiling Price: "; policyValue.value = 35; }
                if(this.value === 'floor') { policyLabel.childNodes[0].nodeValue = "Floor Price: "; policyValue.value = 65; }
                if(this.value === 'tax') { policyLabel.childNodes[0].nodeValue = "Tax per unit: "; policyValue.value = 15; }
                if(this.value === 'sub') { policyLabel.childNodes[0].nodeValue = "Subsidy per unit: "; policyValue.value = 15; }
                policyVal.innerText = policyValue.value;
            }
            updateMarket();
        });

        policyValue.addEventListener('input', function() { policyVal.innerText = this.value; updateMarket(); });
        [edSlider, esSlider].forEach(el => el.addEventListener('input', updateMarket));

        // High-res Canvas Downloader Plugin
        document.getElementById('downloadBtn').addEventListener('click', () => {
            html2canvas(document.getElementById('downloadArea'), { scale: 3 }).then(canvas => {
                let link = document.createElement('a');
                link.download = 'clean-market-model.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });

        // Init
        updateMarket();
    </script>
</body>
</html>
